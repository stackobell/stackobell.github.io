<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Digital | Commercial Growth Consultant</title>
    <style>
        :root {
            --bg: #f4f4f2; /* Off-white premium editorial background */
            --text: #0a0a0a; /* Stark black */
            --accent: #f2a900; /* Vibrant orange/yellow accent */
            --muted: #555555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar */
        header {
            width: 100%;
            border-bottom: 1px solid var(--text);
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
        }

        .logo span {
            color: var(--muted);
            font-weight: 300;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 30px;
        }

        /* Main Hero Split Layout */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            padding: 60px 4%;
            gap: 40px;
            align-items: center;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Left Side Content */
        .hero-left {
            position: relative;
        }

        /* Geometric Accents replicating the image */
        .circle-solid {
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: var(--accent);
            border-radius: 50%;
            top: -40px;
            left: -20px;
            z-index: 1;
        }

        .circle-outline {
            position: absolute;
            width: 160px;
            height: 160px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            bottom: -30px;
            right: 15%;
            z-index: 1;
        }

        h1 {
            font-size: clamp(3.5rem, 7vw, 6.5rem);
            line-height: 0.85;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
        }

        /* Services Tagline Grid at Bottom Left */
        .services-footer {
            border-top: 1px solid var(--text);
            padding-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .services-footer span {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Right Side Frame */
        .hero-right {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-frame {
            border: 1px solid var(--text);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1.3 / 1;
            display: flex;
            background-color: var(--bg);
        }

        /* Clean placeholder for headshot/graphic */
        .image-placeholder {
            width: 100%;
            height: 100%;
            background-color: #e5e5e3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            border: 1px dashed #b5b5b3;
        }

        .image-placeholder p {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .image-placeholder a {
            color: var(--text);
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Responsive scaling for mobile devices */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                padding: 40px 4%;
            }
            h1 {
                font-size: 4rem;
            }
            header nav {
                display: none; /* Simplifies mobile view */
            }
            .circle-solid {
                width: 100px;
                height: 100px;
            }
            .circle-outline {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">stack<span>digital</span></div>
        <nav>
            <a href="mailto:hello@stackdigital.ie">Contact</a>
        </nav>
    </header>

    <main>
        <div class="hero-left">
            <div class="circle-solid"></div>
            <h1>The<br>Digital<br>Stack.</h1>
            <div class="circle-outline"></div>
            
            <div class="services-footer">
                <span>E-Commerce Optimization</span>
                <span>Performance Marketing</span>
                <span>SME Growth Strategy</span>
            </div>
        </div>

        <div class="hero-right">
            <div class="image-frame">
                <div class="image-placeholder">
                    <p>Building high-performance digital frameworks that scale your sales.</p>
                    <a href="mailto:hello@stackdigital.ie">hello@stackdigital.ie</a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
