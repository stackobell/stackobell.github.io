<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Digital | Commercial Growth Consultant</title>
    <style>
        :root {
            --bg: #f4f4f2; /* Off-white premium editorial background */
            --text: #0a0a0a; /* Stark black */
            --accent: #f2a900; /* Vibrant orange/yellow accent */
            --muted: #555555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar */
        header {
            width: 100%;
            border-bottom: 1px solid var(--text);
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
        }

        .logo span {
            color: var(--muted);
            font-weight: 300;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Left-Aligned Layout */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
            padding: 60px 4%;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* Wrapper to keep geometric circles positioned correctly relative to the text */
        .hero-text-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* Geometric Accents */
        .circle-solid {
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: var(--accent);
            border-radius: 50%;
            top: -20px;
            left: -40px;
            z-index: 1;
        }

        .circle-outline {
            position: absolute;
            width: 160px;
            height: 160px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            bottom: -30px;
            right: -20px;
            z-index: 1;
        }

        h1 {
            font-size: clamp(4rem, 9vw, 7.5rem);
            line-height: 0.85;
            font-weight: 800;
            letter-spacing: -0.04em;
            position: relative;
            z-index: 2;
        }

        /* Force lowercase on 'stack' and uppercase on 'DIGITAL' */
        .lowercase {
            text-transform: lowercase;
            display: block;
        }

        .uppercase {
            text-transform: uppercase;
            display: block;
        }

        /* Pitch & Contact Block */
        .intro-block {
            max-width: 650px;
            margin-bottom: 50px;
        }

        .intro-text {
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .contact-link {
            display: inline-block;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 2px;
            transition: color 0.2s;
        }

        .contact-link:hover {
            color: var(--accent);
        }

        /* Interactive Services Navigation Grid */
        .services-footer {
            border-top: 1px solid var(--text);
            padding-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            width: 100%;
            margin-bottom: 60px;
        }

        .services-footer a {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
            text-decoration: none;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.2s;
        }

        .services-footer a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent);
            transform-origin: bottom left;
            transition: transform 0.25s ease-out;
        }

        .services-footer a:hover {
            color: var(--accent);
        }

        .services-footer a:hover::after {
            transform: scaleX(1);
        }

        /* Brands/Clients Section */
        .brands-section {
            width: 100%;
            border-top: 1px solid #e0e0e0;
            padding-top: 30px;
            margin-top: 20px;
        }

        .brands-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 25px;
        }

        .brands-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            align-items: center;
        }

        .brand-logo-container {
            height: 35px;
            display: flex;
            align-items: center;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .brand-logo-container:hover {
            filter: grayscale(0%);
            opacity: 1;
        }

        .brand-logo-container svg {
            height: 100%;
            max-width: 140px;
            width: auto;
        }

        /* Responsive scaling for mobile devices */
        @media (max-width: 768px) {
            h1 {
                font-size: 5rem;
            }
            .circle-solid {
                width: 100px;
                height: 100px;
                top: -10px;
                left: -20px;
            }
            .circle-outline {
                width: 110px;
                height: 110px;
                bottom: -15px;
                right: -10px;
            }
            .services-footer {
                gap: 20px;
                flex-direction: column;
            }
            .brands-grid {
                gap: 35px;
                flex-direction: row;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">stack<span>digital</span></div>
        <nav>
            <a href="mailto:hello@stackdigital.ie">Contact</a>
        </nav>
    </header>

    <main>
        <div class="hero-text-wrapper">
            <div class="circle-solid"></div>
            <h1>
                <span class="lowercase">stack</span>
                <span class="uppercase">digital</span>
            </h1>
            <div class="circle-outline"></div>
        </div>

        <div class="intro-block">
            <p class="intro-text">
                Building high-performance digital frameworks that scale your sales. No fluff, just commercial growth for established SMEs.
            </p>
            <a href="mailto:hello@stackdigital.ie" class="contact-link">hello@stackdigital.ie</a>
        </div>

        <!-- Clickable Services Navigation -->
        <div class="services-footer">
            <a href="ecommerce.html">E-Commerce Optimisation</a>
            <a href="marketing.html">Performance Marketing</a>
            <a href="strategy.html">SME Growth Strategy</a>
        </div>

        <!-- Brands I've Helped Section with actual vector SVGs -->
        <div class="brands-section">
            <div class="brands-title">Brands I've helped</div>
            <div class="brands-grid">
                
                <!-- Bewley's SVG -->
                <div class="brand-logo-container" title="Bewley's">
                    <svg viewBox="0 0 160 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <text x="10" y="35" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#a41c2c" letter-spacing="1">Bewley's</text>
                    </svg>
                </div>

                <!-- Windsor Motors SVG -->
                <div class="brand-logo-container" title="Windsor Motors">
                    <svg viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="10" width="170" height="30" rx="3" fill="#003366" />
                        <text x="15" y="31" font-family="Arial, sans-serif" font-weight="900" font-size="14" fill="#ffffff" letter-spacing="2">WINDSOR</text>
                        <text x="110" y="31" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="#ffcc00" letter-spacing="1">MOTORS</text>
                    </svg>
                </div>

                <!-- Nissan SVG -->
                <div class="brand-logo-container" title="Nissan">
                    <svg viewBox="0 0 100 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="25" r="18" stroke="#111111" stroke-width="2.5" fill="none"/>
                        <rect x="24" y="21" width="52" height="8" fill="#f4f4f2"/>
                        <line x1="20" y1="25" x2="80" y2="25" stroke="#111111" stroke-width="5"/>
                        <text x="50" y="29" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" font-weight="bold" fill="#111111" text-anchor="middle" letter-spacing="1.5">NISSAN</text>
                    </svg>
                </div>

                <!-- Renault SVG -->
                <div class="brand-logo-container" title="Renault">
                    <svg viewBox="0 0 100 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 8 L68 25 L50 42 L32 25 Z" stroke="#111111" stroke-width="4" fill="none"/>
                        <path d="M50 16 L59 25 L50 34 L41 25 Z" stroke="#111111" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>

                <!-- McGuirks Golf SVG -->
                <div class="brand-logo-container" title="McGuirks Golf">
                    <svg viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <text x="10" y="33" font-family="'Impact', Arial Black, sans-serif" font-size="21" font-weight="900" fill="#006633" letter-spacing="-0.5">McGUIRKS</text>
                        <text x="116" y="33" font-family="'Impact', Arial Black, sans-serif" font-size="21" font-weight="900" fill="#f2a900" letter-spacing="-0.5">GOLF</text>
                        <circle cx="168" cy="24" r="5" fill="#006633"/>
                    </svg>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
