<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Digital | Commercial Growth Consultant</title>
    <style>
        :root {
            --bg: #f4f4f2; /* Off-white premium editorial background */
            --text: #0a0a0a; /* Stark black */
            --accent: #f2a900; /* Vibrant orange/yellow accent */
            --muted: #555555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Bar */
        header {
            width: 100%;
            border-bottom: 1px solid var(--text);
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
        }

        .logo span {
            color: var(--muted);
            font-weight: 300;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Centered Hero Layout */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 4%;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        /* Wrapper to keep geometric circles positioned correctly relative to the centered text */
        .hero-text-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 50px;
        }

        /* Geometric Accents */
        .circle-solid {
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: var(--accent);
            border-radius: 50%;
            top: -30px;
            left: -40px;
            z-index: 1;
        }

        .circle-outline {
            position: absolute;
            width: 160px;
            height: 160px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            bottom: -40px;
            right: -40px;
            z-index: 1;
        }

        h1 {
            font-size: clamp(4rem, 10vw, 8rem);
            line-height: 0.85;
            font-weight: 800;
            letter-spacing: -0.04em;
            position: relative;
            z-index: 2;
        }

        /* Style to force lowercase on 'stack' and uppercase on 'DIGITAL' */
        .lowercase {
            text-transform: lowercase;
            display: block;
        }

        .uppercase {
            text-transform: uppercase;
            display: block;
        }

        /* Pitch & Contact Block */
        .intro-block {
            max-width: 600px;
            margin: 0 auto 50px auto;
        }

        .intro-text {
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .contact-link {
            display: inline-block;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 2px;
            transition: color 0.2s;
        }

        .contact-link:hover {
            color: var(--accent);
        }

        /* Services Tagline Grid at Bottom */
        .services-footer {
            border-top: 1px solid var(--text);
            padding-top: 25px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        .services-footer span {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Responsive scaling for mobile devices */
        @media (max-width: 768px) {
            h1 {
                font-size: 5rem;
            }
            .circle-solid {
                width: 100px;
                height: 100px;
                top: -20px;
                left: -20px;
            }
            .circle-outline {
                width: 110px;
                height: 110px;
                bottom: -20px;
                right: -20px;
            }
            .services-footer {
                gap: 15px;
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">stack<span>digital</span></div>
        <nav>
            <a href="mailto:hello@stackdigital.ie">Contact</a>
        </nav>
    </header>

    <main>
        <div class="hero-text-wrapper">
            <div class="circle-solid"></div>
            <h1>
                <span class="lowercase">stack</span>
                <span class="uppercase">digital</span>
            </h1>
            <div class="circle-outline"></div>
        </div>

        <div class="intro-block">
            <p class="intro-text">
                Building high-performance digital frameworks that scale your sales. No fluff, just commercial growth for established SMEs.
            </p>
            <a href="mailto:hello@stackdigital.ie" class="contact-link">hello@stackdigital.ie</a>
        </div>

        <div class="services-footer">
            <span>E-Commerce Optimisation</span>
            <span>Performance Marketing</span>
            <span>SME Growth Strategy</span>
        </div>
    </main>

</body>
</html>
